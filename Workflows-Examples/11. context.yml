name: Context Demo

on:
  workflow_dispatch:

env:
  APP_NAME: entrust

jobs:
  job1:
    runs-on: ubuntu-latest

    outputs:
      app_name: ${{ steps.set.outputs.app_name }}

    steps:
      - name: Set output
        id: set
        run: echo "app_name=demo-app" >> $GITHUB_OUTPUT

  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - name: Use all contexts
        run: |
          echo "Repo: ${{ github.repository }}"
          echo "User: ${{ github.actor }}"
          echo "Env: ${{ env.APP_NAME }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "From Job1: ${{ needs.job1.outputs.app_name }}"
``
