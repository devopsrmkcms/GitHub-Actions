name: Env Variables Demo

on:
  workflow_dispatch:

env:
  APP_NAME: devops-app
  ENVIRONMENT: staging
  VERSION: v1.2.3
  OWNER: rizwan
  REGION: ap-south-1

jobs:
  print-env:
    runs-on: ubuntu-latest

    steps:
      - name: Print environment variables
        run: |
          echo "Application Name: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "Version: $VERSION"
          echo "Owner: $OWNER"
          echo "Region: $REGION"
