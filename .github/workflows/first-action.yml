name: pass variables

on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.setvar.outputs.name }}

    steps:
      - id: setvar
        run: echo "name=rizwan" >> $GITHUB_OUTPUT

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - run: echo "NAME = ${{ needs.job1.outputs.name }}"
